services:
  web:
    build: .
    ports:
      - "8001:8001"
    volumes:
      - .:/app
      - db_data:/app/db
    environment:
      - DJANGO_SETTINGS_MODULE=core.settings
      - DB_PATH=/app/db/db.sqlite3
    command: >
      sh -c "python manage.py migrate &&
             python manage.py runserver 0.0.0.0:8001"
    restart: unless-stopped

volumes:
  db_data:
